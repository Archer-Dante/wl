name: Update remote file

on:
  schedule:
    - cron: "*/30 * * * *"   # каждые 30 минут
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download file
        run: |
          URL="https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt"
          OUTPUT="my_file.txt"

          for i in {1..5}; do
            curl -L $URL -o $OUTPUT && break
            echo "Download failed, retry in 60 seconds"
            sleep 60
          done

      - name: Commit and push
        run: |
          DATE=$(date "+%Y-%m-%d %H:%M:%S")

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add my_file.txt
          git commit -m "Auto update: $DATE" || echo "No changes"
          git push
