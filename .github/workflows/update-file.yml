name: Update remote file

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download file
        run: |
          curl -L https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt -o my_file.txt

      - name: Commit and push
        run: |
          DATE=$(date "+%Y-%m-%d %H:%M:%S")

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add wlvl.txt
          git commit -m "Auto update: $DATE" || echo "No changes"
          git push
